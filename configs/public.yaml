# Public configuration (safe to commit)
app:
  name: ai-agent-learning
  env: dev

logging:
  level: INFO

services:
  minimax:
    base_url: "https://api.minimax.chat/v1"
    # Text-to-image API host (often differs from chat base_url; see Minimax docs).
    image_base_url: "https://api.minimaxi.com/v1"
  deepseek:
    base_url: "https://api.deepseek.com"
  amap_weather:
    base_url: "https://restapi.amap.com/v3/weather"

memory:
  long_term:
    write_keywords:
      - "方法"
      - "叫什么"
      - "how"
      - "method"
      - "偏好"
      - "preference"
